<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dakboard Mood Chooser</title>

<style>
  :root {
    --scale: 0.88; /* 1 = 100%, 0.75 = 75%, 0.5 = 50% */
    --mood-size: calc(75px * var(--scale));
    --gap-size: calc(12px * var(--scale));
  }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .mood-wrapper {
    display: flex;
    flex-direction: row;
    gap: var(--gap-size);
    align-items: center;
    justify-content: center;
    padding: calc(8px * var(--scale));
    background: transparent;
  }

  .mood {
    width: var(--mood-size);
    height: var(--mood-size);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    background: #43a047;
    padding: 0;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    touch-action: manipulation;
  }

  .mood:hover {
    transform: scale(1.08);
  }

  .mood:active {
    transform: scale(0.96);
  }

  .eye {
    position: absolute;
    top: calc(20px * var(--scale));
    font-size: calc(18px * var(--scale));
    color: white;
    line-height: 1;
  }

  .eye.left {
    left: calc(19px * var(--scale));
  }

  .eye.right {
    right: calc(19px * var(--scale));
  }

  .star-eye {
    font-size: calc(17px * var(--scale));
  }

  .mouth {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .smile {
    bottom: calc(16px * var(--scale));
    width: calc(34px * var(--scale));
    height: calc(18px * var(--scale));
    border-bottom: calc(5px * var(--scale)) solid white;
    border-radius: 0 0 calc(40px * var(--scale)) calc(40px * var(--scale));
  }

  .straight {
    bottom: calc(24px * var(--scale));
    width: calc(32px * var(--scale));
    height: calc(5px * var(--scale));
    background: white;
    border-radius: calc(10px * var(--scale));
  }

  .sad {
    bottom: calc(16px * var(--scale));
    width: calc(34px * var(--scale));
    height: calc(18px * var(--scale));
    border-top: calc(5px * var(--scale)) solid white;
    border-radius: calc(40px * var(--scale)) calc(40px * var(--scale)) 0 0;
  }
</style>
</head>

<body>

<div class="mood-wrapper">
  <button class="mood" data-id="1" data-state="0"></button>
  <button class="mood" data-id="2" data-state="0"></button>
  <button class="mood" data-id="3" data-state="0"></button>
  <button class="mood" data-id="4" data-state="0"></button>
  <button class="mood" data-id="5" data-state="0"></button>
  <button class="mood" data-id="6" data-state="0"></button>
</div>

<script>
  const moods = document.querySelectorAll(".mood");

  const moodStates = [
    {
      name: "star-smile",
      color: "#1e88e5",
      eyes: "star",
      mouth: "smile"
    },
    {
      name: "smile",
      color: "#43a047",
      eyes: "normal",
      mouth: "smile"
    },
    {
      name: "straight",
      color: "#fdd835",
      eyes: "normal",
      mouth: "straight"
    },
    {
      name: "sad",
      color: "#e53935",
      eyes: "normal",
      mouth: "sad"
    }
  ];

  function renderMood(button, stateIndex) {
    const state = moodStates[stateIndex];

    button.innerHTML = "";
    button.style.background = state.color;
    button.dataset.state = stateIndex;

    const leftEye = document.createElement("span");
    leftEye.classList.add("eye", "left");

    const rightEye = document.createElement("span");
    rightEye.classList.add("eye", "right");

    if (state.eyes === "star") {
      leftEye.textContent = "★";
      rightEye.textContent = "★";
      leftEye.classList.add("star-eye");
      rightEye.classList.add("star-eye");
    } else {
      leftEye.textContent = "●";
      rightEye.textContent = "●";
    }

    const mouth = document.createElement("span");
    mouth.classList.add("mouth", state.mouth);

    button.appendChild(leftEye);
    button.appendChild(rightEye);
    button.appendChild(mouth);
  }

  function changeMood(button) {
    const id = button.dataset.id;

    let currentState = parseInt(button.dataset.state);
    let nextState = currentState + 1;

    if (nextState >= moodStates.length) {
      nextState = 0;
    }

    renderMood(button, nextState);

    localStorage.setItem("dakboard_mood_" + id, nextState);

    window.parent.postMessage({
      type: "dakboardMoodChooser",
      id: id,
      state: moodStates[nextState].name,
      stateIndex: nextState
    }, "*");
  }

  moods.forEach(button => {
    const id = button.dataset.id;
    const savedState = localStorage.getItem("dakboard_mood_" + id);
    const startState = savedState !== null ? parseInt(savedState) : 0;

    renderMood(button, startState);

    let lastTap = 0;

    button.addEventListener("click", event => {
      const currentTime = new Date().getTime();
      const tapLength = currentTime - lastTap;

      if (tapLength < 500 && tapLength > 0) {
        event.preventDefault();
        changeMood(button);
      }

      lastTap = currentTime;
    });
  });
</script>

</body>
</html>
